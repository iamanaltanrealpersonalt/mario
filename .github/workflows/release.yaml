name: Build and Release Windows
on:
  push:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # ZERO-WAIT CDN BYPASS
      # This grabs the exact previous tag and rewrites your config file on the fly
      # so Electrobun hits the direct download link instead of the cached 'latest' link.
      - name: Bypass GitHub CDN Cache
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(curl -sL -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name)
          echo "Previous release found: $PREV_TAG"
          sed -i "s|releases/latest/download|releases/download/$PREV_TAG|g" electrobun.config.ts
          echo "Config temporarily rewritten to bypass cache! Let's go!"

      # 1. Build the frontend UI so Electrobun has something to bundle
      - name: Build
        run: bun run build:stable

      # 3. Upload everything to the GitHub Release
      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/*.exe
            artifacts/*.zst
            artifacts/*.zip
            artifacts/*.patch
            artifacts/update.json
            build/stable-win-x64/*.exe
            build/stable-win-x64/*.zst
            build/stable-win-x64/*.zip
            build/stable-win-x64/*.patch
            build/stable-win-x64/update.json
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
